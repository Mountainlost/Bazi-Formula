  resource_hidden_presence: 1
  resource_wealth_visible_presence: 1
  resource_tianyi_auxiliary: 1
  resource_wenchang_auxiliary: 1
  resource_yima_auxiliary: 1
  resource_current_mentor_favorable: 2
  resource_current_mentor_positive: 1
  resource_current_wealth_favorable: 1
  resource_current_wealth_positive: 1
  resource_current_wealth_cautious: -1
  resource_current_wealth_challenging: -2
  future_favorable_year: 2
  future_positive_year: 1
  future_mixed_year: 0
  future_cautious_year: -1
  future_challenging_year: -2
  future_base_support_bonus: 1
  risk_strength_weak: 2
  risk_strength_balanced: 1
  risk_current_wealth_cautious: 1
  risk_current_wealth_challenging: 2
